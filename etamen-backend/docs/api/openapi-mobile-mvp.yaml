        items:
          type: array
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id: { type: integer }
              quantity: { type: integer, minimum: 1 }
    PharmacyOrderEnvelope:
      allOf:
        - $ref: '#/components/schemas/StandardEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/PharmacyOrder' }
    PharmacyOrderListEnvelope:
      allOf:
        - $ref: '#/components/schemas/StandardEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/PharmacyOrder' }
    PharmacyOrder:
      type: object
      properties:
        id: { type: integer }
        order_number: { type: string }
        subtotal: { type: string }
        discount_total: { type: string }
        grand_total: { type: string }
        currency: { type: string, example: EGP }
        payment_status: { type: string }
        order_status: { type: string }
    LabTestListEnvelope:
      allOf:
        - $ref: '#/components/schemas/StandardEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer }
                  name_en: { type: string }
                  price: { type: string }
    CreateLabOrderRequest:
